<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maestro · 智能体编排工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#F5F4F1;color:#1A1814;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-family:"Hanken Grotesk","PingFang SC","Noto Sans SC",system-ui,sans-serif;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#DBD8D0;border-radius:8px;border:3px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-thumb:hover{background:#C9C5BB;border:3px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-track{background:transparent;}
  @keyframes ping{0%{transform:scale(.85);opacity:.5;}70%{transform:scale(2.4);opacity:0;}100%{opacity:0;}}
  @keyframes flow{from{offset-distance:0%;}to{offset-distance:100%;}}
  @keyframes dash{to{stroke-dashoffset:-18;}}
  @keyframes enter{from{opacity:0;transform:translateY(-7px);}to{opacity:1;transform:none;}}
  @keyframes shimmer{from{background-position:-160px 0;}to{background-position:220px 0;}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
</style>
</head>
<body>
<div id="root"></div>
<template id="tpl">
<div style="display:flex;height:100vh;width:100%;overflow:hidden;background:#F5F4F1;">

  <aside style="width:246px;flex:none;height:100%;background:#FBFAF8;border-right:1px solid #E9E7E1;display:flex;flex-direction:column;">
    <div style="padding:16px 16px 12px;display:flex;align-items:center;gap:10px;">
      <div style="width:30px;height:30px;border-radius:9px;background:{{ acc }};display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(20,18,14,.12);">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#1A1814" stroke-width="1.6"><circle cx="4.5" cy="9" r="2" fill="#1A1814" stroke="none"></circle><circle cx="13.5" cy="4.5" r="2" fill="#1A1814" stroke="none"></circle><circle cx="13.5" cy="13.5" r="2" fill="#1A1814" stroke="none"></circle><path d="M6 8 12 5M6 10 12 13"></path></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14.5px;font-weight:700;letter-spacing:-.01em;">Maestro</div>
        <div style="font-size:11px;color:#A39E94;margin-top:1px;">智能体编排工作台</div>
      </div>
    </div>

    <div style="height:1px;background:#EEEDE8;margin:2px 12px 8px;"></div>

    <nav style="flex:1;overflow-y:auto;padding:0 10px;">
      <button onClick="{{ goDash }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;background:{{ nav.dash.bg }};color:{{ nav.dash.fg }};font-weight:{{ nav.dash.w }};box-shadow:{{ nav.dash.bar }};font-family:inherit;">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.6" fill="currentColor"></rect><rect x="10" y="2" width="6" height="6" rx="1.6" fill="currentColor" opacity="0.5"></rect><rect x="2" y="10" width="6" height="6" rx="1.6" fill="currentColor" opacity="0.5"></rect><rect x="10" y="10" width="6" height="6" rx="1.6" fill="currentColor"></rect></svg>
        总控台
      </button>
      <button onClick="{{ goOrch }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;background:{{ nav.orch.bg }};color:{{ nav.orch.fg }};font-weight:{{ nav.orch.w }};box-shadow:{{ nav.orch.bar }};font-family:inherit;">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="9" r="2.2"></circle><circle cx="14" cy="4" r="2.2"></circle><circle cx="14" cy="14" r="2.2"></circle><path d="M6 8 12 5M6 10 12 13"></path></svg>
        编排画布
      </button>
      <button onClick="{{ goProjects }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;background:{{ nav.projects.bg }};color:{{ nav.projects.fg }};font-weight:{{ nav.projects.w }};box-shadow:{{ nav.projects.bar }};font-family:inherit;">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><rect x="2.5" y="3" width="13" height="3.2" rx="1.2" fill="currentColor"></rect><rect x="2.5" y="7.4" width="13" height="3.2" rx="1.2" fill="currentColor" opacity="0.55"></rect><rect x="2.5" y="11.8" width="13" height="3.2" rx="1.2" fill="currentColor" opacity="0.3"></rect></svg>
        项目
      </button>
      <button onClick="{{ goTasks }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;background:{{ nav.tasks.bg }};color:{{ nav.tasks.fg }};font-weight:{{ nav.tasks.w }};box-shadow:{{ nav.tasks.bar }};font-family:inherit;">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3.5 5h11M3.5 9h11M3.5 13h7"></path></svg>
        任务
      </button>
      <button onClick="{{ goApps }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;background:{{ nav.apps.bg }};color:{{ nav.apps.fg }};font-weight:{{ nav.apps.w }};box-shadow:{{ nav.apps.bar }};font-family:inherit;">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><rect x="2.5" y="2.5" width="5.5" height="5.5" rx="1.4" fill="currentColor"></rect><rect x="10" y="2.5" width="5.5" height="5.5" rx="1.4" fill="currentColor" opacity="0.55"></rect><rect x="2.5" y="10" width="5.5" height="5.5" rx="1.4" fill="currentColor" opacity="0.55"></rect><rect x="10" y="10" width="5.5" height="5.5" rx="1.4" fill="currentColor"></rect></svg>
        应用广场
      </button>

      <div style="font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#B6B1A7;padding:14px 12px 6px;">部门</div>
      <sc-for list="{{ depts }}" as="d" hint-placeholder-count="6">
        <button onClick="{{ d.open }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:10px;padding:7px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13px;text-align:left;margin-bottom:1px;background:{{ d.nbg }};color:{{ d.nfg }};font-weight:{{ d.nw }};box-shadow:{{ d.nbar }};font-family:inherit;">
          <span style="width:18px;height:18px;flex:none;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;background:{{ d.color }};">{{ d.glyph }}</span>
          <span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ d.name }}</span>
          <span style="font-size:10.5px;color:#B6B1A7;font-family:'JetBrains Mono',monospace;">{{ d.tasks }}</span>
        </button>
      </sc-for>

      <div style="font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#B6B1A7;padding:14px 12px 6px;">团队</div>
      <button onClick="{{ goAgents }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;background:{{ nav.agents.bg }};color:{{ nav.agents.fg }};font-weight:{{ nav.agents.w }};box-shadow:{{ nav.agents.bar }};font-family:inherit;">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="12" height="9" rx="3"></rect><circle cx="7" cy="9.6" r="1" fill="currentColor" stroke="none"></circle><circle cx="11" cy="9.6" r="1" fill="currentColor" stroke="none"></circle><path d="M9 5V3"></path></svg>
        Agent 团队
      </button>
      <button onClick="{{ goPeople }}" style-hover="background:#F2F0EA" style="width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;margin-bottom:2px;background:{{ nav.people.bg }};color:{{ nav.people.fg }};font-weight:{{ nav.people.w }};box-shadow:{{ nav.people.bar }};font-family:inherit;">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="6" r="2.6"></circle><path d="M2.8 14.4c0-2.5 1.9-3.8 4.2-3.8s4.2 1.3 4.2 3.8"></path><circle cx="13" cy="6.8" r="2" opacity="0.5"></circle></svg>
        人员
      </button>
    </nav>

    <div onClick="{{ pickWho }}" style-hover="background:#F2F0EA" style="border-top:1px solid #EEEDE8;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;">
      <div style="width:28px;height:28px;border-radius:50%;background:#E0922E;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ opAv }}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12.5px;font-weight:600;">{{ opName }}</div>
        <div style="font-size:11px;color:#A39E94;">{{ opRole }}</div>
      </div>
      <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="#B6B1A7" stroke-width="1.5"><path d="M3.5 6.5h11M3.5 11.5h11"></path></svg>
    </div>
  </aside>

  <div style="flex:1;min-width:0;height:100%;display:flex;flex-direction:column;">

    <header style="height:56px;flex:none;border-bottom:1px solid #E9E7E1;background:rgba(251,250,248,.86);backdrop-filter:blur(8px);display:flex;align-items:center;gap:16px;padding:0 22px;">
      <div style="flex:1;min-width:0;display:flex;align-items:center;gap:10px;">
        <span style="font-size:14px;color:#A39E94;">{{ crumbRoot }}</span>
        <span style="font-size:13px;color:#D6D2C9;">/</span>
        <span style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ crumbLeaf }}</span>
      </div>

      <div style="display:flex;align-items:center;gap:8px;height:34px;padding:0 11px;border:1px solid #E6E3DC;border-radius:9px;background:#fff;width:240px;">
        <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="#B6B1A7" stroke-width="1.6"><circle cx="8" cy="8" r="5"></circle><path d="M12 12l3 3"></path></svg>
        <input id="search" onKeyDown="{{ onSearchKey }}" placeholder="搜索 Agent、任务、项目… ⌘K / 回车" style="flex:1;min-width:0;border:none;outline:none;background:transparent;font-size:13px;font-family:inherit;color:#1A1814;">
        <span style="font-size:11px;color:#C9C5BB;font-family:'JetBrains Mono',monospace;border:1px solid #ECEAE4;border-radius:5px;padding:1px 5px;">⏎</span>
      </div>

      <div style="display:flex;align-items:center;gap:7px;height:32px;padding:0 11px 0 10px;border-radius:8px;background:#FFF6D6;border:1px solid #F3E2A0;">
        <span style="position:relative;display:inline-flex;width:7px;height:7px;"><span style="position:absolute;inset:0;border-radius:50%;background:{{ acc }};animation:ping 1.8s ease-out infinite;"></span><span style="position:relative;width:7px;height:7px;border-radius:50%;background:{{ acc }};"></span></span>
        <span style="font-size:12.5px;font-weight:600;color:#8a6d00;"><span style="font-family:'JetBrains Mono',monospace;">{{ activeCount }}</span> 个 Agent 运行中</span>
      </div>

      <button onClick="{{ newTask }}" style-hover="filter:brightness(.97)" style="display:flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:0 1px 2px rgba(20,18,14,.08);">
        <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M9 3.5v11M3.5 9h11"></path></svg>
        新建任务
      </button>
    </header>

    <main style="flex:1;min-height:0;overflow-y:auto;">

      <!-- ====================== DASHBOARD ====================== -->
      <sc-if value="{{ isDashboard }}" hint-placeholder-val="{{ true }}">
      <div style="padding:26px 30px 40px;max-width:1320px;">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;">
          <div>
            <div style="font-size:22px;font-weight:700;letter-spacing:-.02em;">你好，{{ opName }} 👋</div>
            <div style="font-size:13.5px;color:#8A857C;margin-top:4px;">编排器正在统筹 <b style="color:#1A1814;">{{ agentTotal }} 个 Agent</b> · 跨 {{ deptTotal }} 个部门 · {{ today }} <span style="font-family:'JetBrains Mono',monospace;color:#A39E94;">{{ clock }}</span></div>
          </div>
          <button onClick="{{ goOrch }}" style-hover="background:#F2F0EA" style="display:flex;align-items:center;gap:8px;height:36px;padding:0 14px;border-radius:9px;background:#fff;border:1px solid #E6E3DC;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;color:#1A1814;">打开编排画布
            <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 9h8M9.5 5l4 4-4 4"></path></svg>
          </button>
        </div>

        <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #E6E3DC;border-radius:14px;padding:8px 8px 8px 16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(20,18,14,.05);">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="{{ acc }}" stroke-width="1.7" stroke-linecap="round"><path d="M9 2.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L9 14.2 5.8 15l.6-3.6-2.6-2.5 3.6-.5z"></path></svg>
          <input id="ql-input" onkeydown="{{ onQuickKey }}" placeholder="一句话描述你要做的…回车即下发(编排器自动拆分给部门员工)" style="flex:1;height:38px;border:none;background:transparent;font-family:inherit;font-size:14px;outline:none;">
          <button onClick="{{ quickLaunch }}" style="height:38px;padding:0 18px;border-radius:10px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;">下发</button>
          <button onClick="{{ newTask }}" title="更多选项" style="height:38px;padding:0 12px;border-radius:10px;background:#fff;border:1px solid #E6E3DC;font-size:13px;cursor:pointer;font-family:inherit;color:#6B6760;">⚙</button>
        </div>

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;">
          <sc-for list="{{ metrics }}" as="m" hint-placeholder-count="4">
            <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;padding:16px 17px;box-shadow:0 1px 2px rgba(20,18,14,.04);">
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <span style="font-size:12.5px;color:#8A857C;font-weight:500;">{{ m.k }}</span>
                <span style="width:8px;height:8px;border-radius:50%;background:{{ m.dot }};"></span>
              </div>
              <div style="font-size:30px;font-weight:700;letter-spacing:-.02em;margin-top:10px;font-family:'JetBrains Mono',monospace;">{{ m.v }}</div>
              <div style="font-size:12px;color:#A39E94;margin-top:3px;">{{ m.s }}</div>
            </div>
          </sc-for>
        </div>

        <div style="display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:16px;">

          <div style="background:#fff;border:1px solid #E9E7E1;border-radius:16px;box-shadow:0 1px 2px rgba(20,18,14,.04);display:flex;flex-direction:column;min-width:0;min-height:380px;">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 18px 12px;border-bottom:1px solid #F0EEE9;">
              <div style="display:flex;align-items:center;gap:9px;"><span style="font-size:14.5px;font-weight:650;">实时编排活动</span><span style="position:relative;display:inline-flex;width:7px;height:7px;"><span style="position:absolute;inset:0;border-radius:50%;background:{{ acc }};animation:ping 1.8s ease-out infinite;"></span><span style="position:relative;width:7px;height:7px;border-radius:50%;background:{{ acc }};"></span></span></div>
              <span style="font-size:12px;color:#B6B1A7;">Agent 之间的任务流转</span>
            </div>
            <div style="flex:1;overflow-y:auto;padding:6px 8px 10px;">
              <sc-for list="{{ activity }}" as="e" hint-placeholder-count="7">
                <div style="display:flex;gap:11px;padding:9px 10px;border-radius:10px;animation:enter .42s ease;" style-hover="background:#FAF9F6">
                  <div style="position:relative;flex:none;display:flex;flex-direction:column;align-items:center;">
                    <span style="width:9px;height:9px;border-radius:50%;background:{{ e.dot }};margin-top:4px;box-shadow:0 0 0 3px {{ e.soft }};"></span>
                  </div>
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:13px;line-height:1.45;color:#2A2722;"><b style="font-weight:650;color:{{ e.c }};">{{ e.a }}</b> <span style="color:#3C3933;">{{ e.t }}</span></div>
                    <div style="font-size:11px;color:#B6B1A7;font-family:'JetBrains Mono',monospace;margin-top:2px;">{{ e.time }}</div>
                  </div>
                </div>
              </sc-for>
            </div>
          </div>

          <div style="background:#fff;border:1px solid #E9E7E1;border-radius:16px;box-shadow:0 1px 2px rgba(20,18,14,.04);display:flex;flex-direction:column;min-width:0;min-height:380px;">
            <div style="padding:15px 18px 12px;border-bottom:1px solid #F0EEE9;"><span style="font-size:14.5px;font-weight:650;">运行中的 Agent</span></div>
            <div style="flex:1;overflow-y:auto;padding:8px;">
              <sc-for list="{{ activeAgents }}" as="a" hint-placeholder-count="5">
                <button onClick="{{ a.open }}" style-hover="background:#FAF9F6" style="width:100%;text-align:left;border:none;background:transparent;cursor:pointer;display:block;padding:9px 10px;border-radius:11px;font-family:inherit;">
                  <div style="display:flex;align-items:center;gap:9px;">
                    <div style="width:25px;height:25px;flex:none;border-radius:7px;background:{{ a.color }};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ a.avatar }}</div>
                    <div style="flex:1;min-width:0;"><div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ a.name }}</div></div>
                    <span style="position:relative;display:inline-flex;width:7px;height:7px;"><span style="position:absolute;inset:0;border-radius:50%;background:{{ acc }};animation:ping 1.8s ease-out infinite;"></span><span style="position:relative;width:7px;height:7px;border-radius:50%;background:{{ acc }};"></span></span>
                  </div>
                  <div style="font-size:11.5px;color:#8A857C;margin:6px 0 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ a.action }}</div>
                  <div style="display:flex;align-items:center;gap:8px;">
                    <div style="flex:1;height:5px;border-radius:5px;background:#F1EFEA;overflow:hidden;"><div style="height:100%;border-radius:5px;background:{{ acc }};width:{{ a.pct }};transition:width .6s ease;"></div></div>
                    <span style="font-size:10.5px;font-weight:700;color:#8a6d00;font-family:'JetBrains Mono',monospace;">{{ a.pct }}</span>
                  </div>
                </button>
              </sc-for>
            </div>
          </div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px;">
          <span style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#A39E94;">部门概览</span>
          <sc-if value="{{ isAdmin }}"><button onClick="{{ newDept }}" style="height:28px;padding:0 11px;border-radius:8px;background:#fff;border:1px solid #E6E3DC;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">+ 新建部门</button></sc-if>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;">
          <sc-for list="{{ depts }}" as="d" hint-placeholder-count="6">
            <button onClick="{{ d.open }}" style-hover="border-color:#D9D5CC;transform:translateY(-1px)" style="text-align:left;cursor:pointer;background:#fff;border:1px solid #E9E7E1;border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(20,18,14,.04);font-family:inherit;transition:transform .15s ease,border-color .15s ease;">
              <div style="display:flex;align-items:center;gap:11px;margin-bottom:13px;">
                <span style="width:34px;height:34px;flex:none;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;background:{{ d.color }};">{{ d.glyph }}</span>
                <div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:650;">{{ d.name }}</div><div style="font-size:11.5px;color:#A39E94;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ d.desc }}</div></div>
              </div>
              <div style="display:flex;align-items:center;gap:16px;">
                <div><span style="font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;">{{ d.tasks }}</span><span style="font-size:11.5px;color:#A39E94;margin-left:4px;">进行中</span></div>
                <div style="width:1px;height:16px;background:#ECEAE4;"></div>
                <div><span style="font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;">{{ d.agentCount }}</span><span style="font-size:11.5px;color:#A39E94;margin-left:4px;">Agent</span></div>
                <div style="margin-left:auto;display:flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:{{ d.statusDot }};"></span><span style="font-size:11.5px;color:#8A857C;">{{ d.statusTxt }}</span></div>
              </div>
            </button>
          </sc-for>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px;">
          <span style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#A39E94;">进行中的项目</span>
          <button onClick="{{ goProjects }}" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:#8a6d00;font-weight:600;">查看全部 →</button>
        </div>
        <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(20,18,14,.04);">
          <sc-for list="{{ projects }}" as="p" hint-placeholder-count="4">
            <button onClick="{{ p.open }}" style-hover="background:#FAF9F6" style="width:100%;text-align:left;border:none;border-bottom:1px solid #F2F0EB;background:transparent;cursor:pointer;display:flex;align-items:center;gap:16px;padding:14px 18px;font-family:inherit;">
              <div style="width:200px;flex:none;"><div style="font-size:13.5px;font-weight:600;">{{ p.name }}</div><div style="font-size:11.5px;color:#A39E94;margin-top:1px;">{{ p.client }}</div></div>
              <div style="flex:1;display:flex;align-items:center;gap:10px;min-width:0;"><div style="flex:1;height:6px;border-radius:6px;background:#F1EFEA;overflow:hidden;max-width:280px;"><div style="height:100%;border-radius:6px;background:{{ p.barColor }};width:{{ p.pct }};"></div></div><span style="font-size:11.5px;font-weight:600;color:#6B6760;font-family:'JetBrains Mono',monospace;">{{ p.pct }}</span></div>
              <div style="display:flex;gap:-6px;flex:none;">
                <sc-for list="{{ p.deptDots }}" as="dd" hint-placeholder-count="3"><span style="width:8px;height:8px;border-radius:50%;background:{{ dd.color }};margin-left:3px;"></span></sc-for>
              </div>
              <span style="flex:none;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:{{ p.sBg }};color:{{ p.sC }};">{{ p.status }}</span>
            </button>
          </sc-for>
        </div>
      </div>
      </sc-if>

      <!-- ====================== ORCHESTRATION ====================== -->
      <sc-if value="{{ isOrch }}">
      <div style="display:flex;flex-direction:column;height:100%;">
        <div style="flex:none;display:flex;align-items:center;gap:16px;padding:16px 28px 14px;border-bottom:1px solid #E9E7E1;background:#FBFAF8;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:18px;font-weight:700;letter-spacing:-.01em;">编排画布</div>
            <div style="font-size:12.5px;color:#8A857C;margin-top:3px;display:flex;align-items:center;gap:8px;"><span style="display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;background:#fff;border:1px solid #E9E7E1;font-weight:600;color:#3C3933;">任务 · {{ activeTitle }}</span><span style="color:#C9C5BB;">·</span><span>项目 {{ activeProj }}</span></div>
          </div>
          <div style="display:flex;align-items:center;padding:3px;background:#F0EEE9;border-radius:10px;gap:2px;">
            <button onClick="{{ setGraph }}" style="display:flex;align-items:center;gap:7px;height:32px;padding:0 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:{{ modeGraph.bg }};color:{{ modeGraph.fg }};box-shadow:{{ modeGraph.sh }};">
              <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="9" r="2.2"></circle><circle cx="14" cy="4" r="2.2"></circle><circle cx="14" cy="14" r="2.2"></circle><path d="M6 8 12 5M6 10 12 13"></path></svg>节点画布</button>
            <button onClick="{{ setAuto }}" style="display:flex;align-items:center;gap:7px;height:32px;padding:0 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:{{ modeAuto.bg }};color:{{ modeAuto.fg }};box-shadow:{{ modeAuto.sh }};">
              <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 2.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L9 14.2 5.8 15l.6-3.6-2.6-2.5 3.6-.5z"></path></svg>智能编排</button>
          </div>
        </div>

        <!-- MODE A: NODE GRAPH -->
        <sc-if value="{{ isGraph }}">
        <div style="flex:1;min-height:0;position:relative;overflow:auto;background:#F7F6F3;background-image:radial-gradient(#E5E2DB 1px,transparent 1px);background-size:22px 22px;">
            <div style="position:relative;width:{{ graph.w }}px;height:{{ graph.h }}px;margin:24px;min-width:820px;min-height:360px;">
              <sc-if value="{{ graph.empty }}"><div style="position:absolute;left:40px;top:40px;color:#A39E94;font-size:14px;">暂无活动任务的计划。新建任务后,这里自动画出流水线节点图。</div></sc-if>
              <svg style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;">
                <sc-for list="{{ graph.edges }}" as="e"><path d="{{ e.d }}" fill="none" stroke="{{ e.color }}" stroke-width="2.4" style="{{ e.pstyle }}"></path></sc-for>
              </svg>
              <sc-for list="{{ graph.edges }}" as="e"><sc-if value="{{ e.flow }}"><div style="position:absolute;left:0;top:0;width:11px;height:11px;border-radius:50%;background:#F0B400;box-shadow:0 0 9px #F4C53A;offset-path:path('{{ e.d }}');offset-rotate:0deg;animation:flow {{ e.dur }} linear infinite;pointer-events:none;"></div></sc-if></sc-for>
              <sc-for list="{{ graph.nodes }}" as="nd" hint-placeholder-count="3">
                <div style="position:absolute;left:{{ nd.x }}px;top:{{ nd.y }}px;width:200px;">
                  <div style="background:{{ nd.nbg }};border:1.5px solid {{ nd.dot }};border-radius:13px;padding:11px 13px;box-shadow:0 6px 18px rgba(20,18,14,.10);">
                    <div style="display:flex;align-items:center;gap:7px;">
                      <sc-if value="{{ nd.seq }}"><span style="flex:none;min-width:17px;height:17px;border-radius:6px;background:#F0EEE9;color:#6B6760;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;padding:0 3px;">{{ nd.seq }}</span></sc-if>
                      <div style="width:24px;height:24px;flex:none;border-radius:7px;background:{{ nd.aColor }};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ nd.avatar }}</div>
                      <div style="flex:1;min-width:0;font-size:12.5px;font-weight:650;color:{{ nd.nfg }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ nd.title }}</div>
                      <sc-if value="{{ nd.pulse }}"><span style="position:relative;display:inline-flex;width:9px;height:9px;flex:none;"><span style="position:absolute;inset:0;border-radius:50%;background:{{ nd.dot }};animation:ping 1.6s ease-out infinite;"></span><span style="position:relative;width:9px;height:9px;border-radius:50%;background:{{ nd.dot }};"></span></span></sc-if>
                      <sc-if value="{{ nd.still }}"><span style="width:9px;height:9px;flex:none;border-radius:50%;background:{{ nd.dot }};"></span></sc-if>
                    </div>
                    <div style="display:flex;align-items:center;gap:7px;margin-top:7px;">
                      <div style="flex:1;min-width:0;font-size:11px;color:{{ nd.subc }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ nd.agent }}</div>
                      <sc-if value="{{ nd.skTxt }}"><span style="flex:none;font-size:10px;font-weight:700;color:{{ nd.skC }};background:{{ nd.skBg }};padding:1px 7px;border-radius:6px;">{{ nd.skTxt }}</span></sc-if>
                    </div>
                  </div>
                </div>
              </sc-for>
            </div>

          <div style="position:sticky;bottom:0;left:0;display:flex;align-items:center;gap:12px;padding:14px 24px;margin-top:-4px;background:linear-gradient(transparent,#F7F6F3 40%);">
            <div style="flex:1;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #E6E3DC;border-radius:12px;padding:10px 14px;box-shadow:0 4px 16px rgba(20,18,14,.06);max-width:680px;">
              <svg width="17" height="17" viewBox="0 0 18 18" fill="none" stroke="#B6B1A7" stroke-width="1.6"><circle cx="9" cy="9" r="6.5"></circle><path d="M9 5.5v3.5l2.2 1.4"></path></svg>
              <span style="flex:1;font-size:13px;color:#B6B1A7;">向画布下发新任务，编排器自动分配给合适的 Agent…</span>
              <button onClick="{{ newTask }}" style="height:30px;padding:0 13px;border-radius:8px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:12.5px;cursor:pointer;font-family:inherit;">下发</button>
            </div>
            <div style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #E6E3DC;border-radius:10px;padding:5px;box-shadow:0 4px 16px rgba(20,18,14,.06);">
              <button style="width:30px;height:30px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:16px;color:#6B6760;" style-hover="background:#F2F0EA">+</button>
              <button style="width:30px;height:30px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:16px;color:#6B6760;" style-hover="background:#F2F0EA">−</button>
              <button style="height:30px;padding:0 10px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:12px;color:#6B6760;font-family:inherit;" style-hover="background:#F2F0EA">适应</button>
            </div>
          </div>
        </div>
        </sc-if>

        <!-- MODE B: AUTO PIPELINE -->
        <sc-if value="{{ isAuto }}">
        <div style="flex:1;min-height:0;overflow-y:auto;padding:24px 28px 40px;background:#F7F6F3;">
          <div style="display:grid;grid-template-columns:1.7fr 1fr;gap:18px;max-width:1180px;">
            <div>
              <div style="background:#fff;border:1px solid #E9E7E1;border-radius:15px;padding:16px 17px;box-shadow:0 1px 2px rgba(20,18,14,.04);margin-bottom:16px;">
                <div style="font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#A39E94;margin-bottom:9px;">描述目标 · 编排器自动拆解</div>
                <div style="font-size:15px;line-height:1.5;color:#2A2722;background:#FAF9F6;border:1px solid #EEEDE7;border-radius:11px;padding:13px 14px;">{{ activeTitle }}</div>
                <div style="display:flex;align-items:center;gap:9px;margin-top:12px;">
                  <button onClick="{{ newTask }}" style="display:flex;align-items:center;gap:7px;height:36px;padding:0 15px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:13px;cursor:pointer;font-family:inherit;">
                    <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M9 2.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L9 14.2 5.8 15l.6-3.6-2.6-2.5 3.6-.5z"></path></svg>重新编排</button>
                  <span style="font-size:12.5px;color:#8A857C;">已生成 <b style="color:#1A1814;">{{ planCount }}</b> 个步骤 · 涉及 <b style="color:#1A1814;">{{ planAgents }}</b> 个 Agent · 含验证回退环</span>
                </div>
              </div>

              <div style="display:flex;align-items:center;gap:9px;margin:4px 2px 12px;"><span style="font-size:13.5px;font-weight:650;">执行计划</span><span style="font-size:11.5px;color:#A39E94;">编排器自动分配 · 可逐步审批</span></div>

              <div style="position:relative;">
                <sc-for list="{{ planSteps }}" as="s" hint-placeholder-count="7">
                  <div style="position:relative;display:flex;gap:14px;padding-bottom:14px;">
                    <div style="position:relative;flex:none;width:30px;display:flex;flex-direction:column;align-items:center;">
                      <div style="width:30px;height:30px;border-radius:50%;background:{{ s.ringBg }};border:2px solid {{ s.ringBd }};color:{{ s.ringFg }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;z-index:1;">{{ s.n }}</div>
                      <div style="flex:1;width:2px;background:#E6E3DC;margin:3px 0;min-height:14px;"></div>
                    </div>
                    <div style="flex:1;min-width:0;background:#fff;border:1px solid {{ s.cardBd }};border-radius:13px;padding:13px 15px;box-shadow:0 1px 2px rgba(20,18,14,.04);">
                      <div style="display:flex;align-items:center;gap:10px;">
                        <div style="flex:1;min-width:0;"><div style="font-size:13.5px;font-weight:650;">{{ s.title }}</div></div>
                        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:{{ s.sBg }};color:{{ s.sC }};"><span style="width:6px;height:6px;border-radius:50%;background:{{ s.sDot }};"></span>{{ s.sLabel }}</span>
                      </div>
                      <div style="display:flex;align-items:center;gap:9px;margin-top:9px;">
                        <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px 3px 4px;border-radius:7px;background:#F7F6F3;border:1px solid #ECEAE4;"><span style="width:18px;height:18px;border-radius:5px;background:{{ s.color }};color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ s.avatar }}</span><span style="font-size:11.5px;font-weight:600;color:#3C3933;">{{ s.agent }}</span></span>
                        <span style="font-size:11.5px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ s.eta }}</span>
                        <span style="font-size:11.5px;color:#B6B1A7;">{{ s.dep }}</span>
                      </div>
                    </div>
                  </div>
                </sc-for>
                <div style="position:absolute;left:64px;top:64px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#B4541E;background:#FCEBDD;border:1px solid #F1CBA6;border-radius:7px;padding:3px 9px;">↺ 验证失败则自动回到 步骤 2</div>
              </div>
            </div>

            <div>
              <div style="background:#fff;border:1px solid #E9E7E1;border-radius:15px;padding:16px 17px;box-shadow:0 1px 2px rgba(20,18,14,.04);margin-bottom:16px;position:sticky;top:0;">
                <div style="font-size:13.5px;font-weight:650;margin-bottom:13px;">编排概要</div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F2F0EB;"><span style="font-size:12.5px;color:#8A857C;">参与 Agent</span><span style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;">{{ planAgents }}</span></div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F2F0EB;"><span style="font-size:12.5px;color:#8A857C;">计划步骤</span><span style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;">{{ planCount }}</span></div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F2F0EB;"><span style="font-size:12.5px;color:#8A857C;">预估成本</span><span style="font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;">—</span></div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;"><span style="font-size:12.5px;color:#8A857C;">回退环</span><span style="font-size:13px;font-weight:600;color:#B4541E;">开发 ↺ 验证</span></div>
                <button onClick="{{ newTask }}" style="width:100%;height:38px;margin-top:14px;border-radius:10px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:13.5px;cursor:pointer;font-family:inherit;">批准并运行</button>
                <button style="width:100%;height:34px;margin-top:8px;border-radius:10px;background:#fff;color:#3C3933;border:1px solid #E6E3DC;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;" style-hover="background:#FAF9F6">逐步审批模式</button>
              </div>
              <div style="background:#1A1814;border-radius:15px;padding:14px 16px;font-family:'JetBrains Mono',monospace;">
                <div style="font-size:11px;color:#8A857C;margin-bottom:8px;letter-spacing:.05em;">编排器日志</div>
                <div style="font-size:11.5px;line-height:1.7;color:#C9C5BB;">
                  <sc-for list="{{ orchLog }}" as="l" hint-placeholder-count="6"><div><span style="color:#7A7569;">{{ l.time }}</span> <span style="color:{{ l.c }};">{{ l.a }}</span> {{ l.txt }}</div></sc-for>
                  <div style="color:{{ acc }};">▸ <span style="border-left:6px solid {{ acc }};animation:blink 1.1s step-end infinite;">&nbsp;</span></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        </sc-if>
      </div>
      </sc-if>

      <!-- ====================== TASK DETAIL ====================== -->
      <sc-if value="{{ isTask }}">
      <div style="padding:24px 30px 40px;max-width:980px;">
        <button onClick="{{ goTasks }}" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:#8A857C;margin-bottom:14px;"><svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 4l-4 5 4 5"></path></svg>返回任务列表</button>
        <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:8px;">
          <div style="flex:1;">
            <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:12px;font-family:'JetBrains Mono',monospace;color:#A39E94;">{{ task.id }}</span><span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:{{ task.sBg }};color:{{ task.sC }};"><span style="width:6px;height:6px;border-radius:50%;background:{{ task.sDot }};"></span>{{ task.sLabel }}</span></div>
            <h1 style="font-size:21px;font-weight:700;letter-spacing:-.01em;margin:9px 0 6px;">{{ task.title }}</h1>
            <div style="font-size:13px;color:#8A857C;">项目 <b style="color:#3C3933;">{{ task.proj }}</b> · 由 <b style="color:#3C3933;">{{ opName }}</b> 创建 · 编排器统筹的 <b style="color:#3C3933;">开发 ↺ 验证</b> 接力</div>
          </div>
          <sc-if value="{{ canApprove }}"><div style="display:flex;gap:8px;flex:none;"><button onClick="{{ approveTask }}" style="height:34px;padding:0 14px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:12.5px;cursor:pointer;font-family:inherit;">批准并运行</button><button onClick="{{ cancelTask }}" style="height:34px;padding:0 13px;border-radius:9px;background:#fff;border:1px solid #E6E3DC;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;">取消</button></div></sc-if>
          <sc-if value="{{ canCancel }}"><button onClick="{{ cancelTask }}" style="flex:none;height:34px;padding:0 14px;border-radius:9px;background:#fff;border:1px solid #F1CBA6;color:#B4541E;font-weight:650;font-size:12.5px;cursor:pointer;font-family:inherit;">■ 停止</button></sc-if>
          <sc-if value="{{ canPublish }}"><button onClick="{{ publishApp }}" style="flex:none;height:34px;padding:0 14px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:12.5px;cursor:pointer;font-family:inherit;">🚀 发布到应用广场</button></sc-if>
          <sc-if value="{{ canRetry }}"><button onClick="{{ retryTask }}" style="flex:none;height:34px;padding:0 14px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:12.5px;cursor:pointer;font-family:inherit;">↻ 重试失败步骤</button></sc-if>
          <sc-if value="{{ canContinue }}"><button onClick="{{ continueTask }}" style="flex:none;height:34px;padding:0 14px;border-radius:9px;background:#fff;border:1px solid #E6E3DC;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;">继续开发</button></sc-if>
          <sc-if value="{{ canSavePb }}"><button onClick="{{ savePlaybook }}" style="flex:none;height:34px;padding:0 13px;border-radius:9px;background:#fff;border:1px solid #E6E3DC;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;">📋 存为剧本</button></sc-if>
          <sc-if value="{{ canReplay }}"><button onClick="{{ openReplay }}" style="flex:none;height:34px;padding:0 13px;border-radius:9px;background:#fff;border:1px solid #E6E3DC;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;">▶ 回放</button></sc-if>

        <sc-if value="{{ canAnswer }}">

          <div style="display:flex;justify-content:flex-end;margin-top:10px;"><button onClick="{{ answerTask }}" style="height:32px;padding:0 15px;border-radius:8px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;cursor:pointer;font-family:inherit;">提交并继续</button></div>
        </div>

                  <sc-if value="{{ s.back }}"><span style="font-size:11px;font-weight:600;color:#B4541E;background:#FCEBDD;border:1px solid #F1CBA6;padding:1px 7px;border-radius:6px;">↺ 退回开发</span></sc-if>
                  <sc-if value="{{ s.canSkip }}"><button onClick="{{ s.doSkip }}" style="font-size:10.5px;font-weight:600;border:1px solid #E6E3DC;background:#fff;color:#6B6760;padding:2px 8px;border-radius:6px;cursor:pointer;font-family:inherit;">⏭ 跳过</button></sc-if>

                  <span style="margin-left:auto;font-size:11px;color:#B6B1A7;font-family:'JetBrains Mono',monospace;">{{ s.filesLabel }} {{ s.time }} · {{ s.dur }}</span>

          <div style="display:flex;gap:8px;"><button onClick="{{ editCurAgent }}" style="height:34px;padding:0 13px;border-radius:9px;background:#fff;border:1px solid #E6E3DC;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;" style-hover="background:#FAF9F6">编辑</button><button onClick="{{ delCurAgent }}" style="height:34px;padding:0 13px;border-radius:9px;background:#fff;border:1px solid #F1CBA6;color:#B4541E;font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;">删除</button></div>

        <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:16px;">

            <div style="display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid #2A2722;"><span style="width:10px;height:10px;border-radius:50%;background:#E06A63;"></span><span style="width:10px;height:10px;border-radius:50%;background:#E0A82E;"></span><span style="width:10px;height:10px;border-radius:50%;background:#4FAE6B;"></span><span style="margin-left:8px;font-size:12px;color:#9A958C;font-family:'JetBrains Mono',monospace;">实时日志 · {{ agent.name }}</span><span style="margin-left:auto;display:flex;align-items:center;gap:5px;"><span style="position:relative;display:inline-flex;width:7px;height:7px;"><span style="position:absolute;inset:0;border-radius:50%;background:{{ acc }};animation:ping 1.8s ease-out infinite;"></span><span style="position:relative;width:7px;height:7px;border-radius:50%;background:{{ acc }};"></span></span><span style="font-size:11px;color:#9A958C;">LIVE</span></span></div>

                <div><div style="font-size:11.5px;color:#A39E94;">今日成本</div><div style="font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px;">{{ agent.cost }}</div></div>

            <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(20,18,14,.04);">

      <!-- ====================== DEPARTMENT WORKSPACE ====================== -->
      <sc-if value="{{ isDept }}">

          <button onClick="{{ newDeptTask }}" style="height:34px;padding:0 13px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:12.5px;cursor:pointer;font-family:inherit;">下发部门任务</button>
        </div>

          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">进行中任务</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;">{{ dept.tasks }}</div></div>
          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">部门 Agent</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;">{{ dept.agentCount }}</div></div>
          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">本周完成</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;">{{ dept.doneWeek }}</div></div>
          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">平均成功率</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;color:#1F7A46;">{{ dept.successAvg }}</div></div>
        </div>

        <sc-if value="{{ dept.isDesign }}">
          <div style="background:#fff;border:1px solid #E9E7E1;border-radius:15px;padding:18px;margin-bottom:20px;box-shadow:0 1px 2px rgba(20,18,14,.04);">
            <div style="display:flex;align-items:center;gap:9px;margin-bottom:15px;"><span style="font-size:14px;font-weight:650;">部门流水线 · 脚本 → 设计图 → 视频</span><span style="font-size:11.5px;color:#A39E94;">多 Agent 接力产出</span></div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
              <div style="border:1px solid #ECEAE4;border-radius:12px;overflow:hidden;">
                <div style="padding:10px 13px;border-bottom:1px solid #F0EEE9;display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:#E0922E;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">文</span><div style="flex:1;font-size:12.5px;font-weight:650;">① 脚本 / 话术</div><span style="font-size:10.5px;font-weight:600;color:#1F7A46;background:#E4F4EA;padding:2px 7px;border-radius:6px;">已完成</span></div>
                <div style="padding:13px;"><div style="font-size:11.5px;color:#8A857C;line-height:1.6;background:#FAF9F6;border:1px solid #EEEDE7;border-radius:8px;padding:10px;">「欢迎来到全新登录体验 — 三步完成安全登录…」<br><span style="color:#B6B1A7;">共 5 段 · 文案 Agent-01</span></div></div>
              </div>
              <div style="border:1.5px solid {{ acc }};border-radius:12px;overflow:hidden;box-shadow:0 4px 14px rgba(47,174,158,.1);">
                <div style="padding:10px 13px;border-bottom:1px solid #F0EEE9;display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:#2FAE9E;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">设</span><div style="flex:1;font-size:12.5px;font-weight:650;">② 设计图</div><span style="font-size:10.5px;font-weight:600;color:#8a6d00;background:#FFF6D6;padding:2px 7px;border-radius:6px;">进行中</span></div>
                <div style="padding:13px;"><div style="aspect-ratio:16/10;border-radius:8px;background:repeating-linear-gradient(135deg,#F2F0EB,#F2F0EB 9px,#EBE9E3 9px,#EBE9E3 18px);border:1px solid #E6E3DC;display:flex;align-items:center;justify-content:center;"><span style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">设计稿 v3 · 6 张</span></div></div>
              </div>
              <div style="border:1px solid #ECEAE4;border-radius:12px;overflow:hidden;opacity:.85;">
                <div style="padding:10px 13px;border-bottom:1px solid #F0EEE9;display:flex;align-items:center;gap:8px;"><span style="width:22px;height:22px;border-radius:6px;background:#E06A63;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">视</span><div style="flex:1;font-size:12.5px;font-weight:650;">③ 视频</div><span style="font-size:10.5px;font-weight:600;color:#6B6760;background:#F0EEE9;padding:2px 7px;border-radius:6px;">排队中</span></div>
                <div style="padding:13px;"><div style="aspect-ratio:16/10;border-radius:8px;background:#1A1814;display:flex;align-items:center;justify-content:center;position:relative;"><span style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;"><span style="width:0;height:0;border-left:10px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:3px;"></span></span><span style="position:absolute;bottom:8px;left:10px;font-size:10.5px;color:#9A958C;font-family:'JetBrains Mono',monospace;">引导动画 · 30s · 待渲染</span></div></div>
              </div>
            </div>
          </div>
        </sc-if>

        <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;padding:15px 17px;margin-bottom:18px;">
          <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px;">
            <span style="font-size:13.5px;font-weight:650;">标准作业流程</span>
            <span style="font-size:11.5px;color:#A39E94;">部门任务按此顺序拆分 · 可选环节由总调度按需取舍 · 质量门失败退回重做</span>
          </div>
          <sc-if value="{{ hasFlow }}">

              <div style="display:flex;align-items:center;gap:6px;border:1px solid #ECEAE4;background:#FBFAF8;border-radius:9px;padding:6px 9px;">
                <span style="font-size:11px;color:#B6B1A7;font-family:'JetBrains Mono',monospace;">{{ f.n }}</span>
                <span style="font-size:13px;">{{ f.emoji }}</span>
                <span style="font-size:12.5px;font-weight:600;">{{ f.name }}</span>
                <button onClick="{{ f.tOpt }}" title="切换 必经/可选" style="font-size:10px;font-weight:600;border:none;cursor:pointer;color:{{ f.optC }};background:{{ f.optBg }};padding:2px 7px;border-radius:6px;font-family:inherit;">{{ f.optLabel }}</button>
                <sc-if value="{{ f.gate }}"><button onClick="{{ f.tGate }}" title="质量门:FAIL 退回重做" style="font-size:10px;font-weight:600;border:none;cursor:pointer;color:#8a6d00;background:#FFF6D6;padding:2px 7px;border-radius:6px;font-family:inherit;">🚦 质量门</button></sc-if>
                <sc-if value="{{ f.notGate }}"><button onClick="{{ f.tGate }}" title="设为质量门" style="font-size:10px;border:none;cursor:pointer;color:#C9C4BA;background:transparent;padding:2px 3px;font-family:inherit;">🚦</button></sc-if>
                <sc-if value="{{ isAdmin }}">
                  <button onClick="{{ f.up }}" style="border:none;background:transparent;cursor:pointer;color:#B6B1A7;font-size:11px;padding:0 2px;">◀</button>
                  <button onClick="{{ f.down }}" style="border:none;background:transparent;cursor:pointer;color:#B6B1A7;font-size:11px;padding:0 2px;">▶</button>
                  <button onClick="{{ f.del }}" style="border:none;background:transparent;cursor:pointer;color:#C9C4BA;font-size:11px;padding:0 2px;" style-hover="color:#B4541E">✕</button>
                </sc-if>
              </div>
              <sc-if value="{{ f.notLast }}"><span style="color:#C9C5BB;font-size:13px;">→</span></sc-if>
            </sc-for>
          </div>
          </sc-if>
          <sc-if value="{{ noFlow }}"><div style="font-size:12.5px;color:#A39E94;">尚未设置流程,任务将由总调度自由指派本部门员工。</div></sc-if>
          <sc-if value="{{ isAdmin }}">
          <div style="display:flex;align-items:center;gap:8px;margin-top:11px;">
            <select id="flow-add" style="height:30px;border:1px solid #E6E3DC;border-radius:8px;padding:0 8px;font-family:inherit;font-size:12px;">
              <sc-for list="{{ flowAddOpts }}" as="o"><option value="{{ o.id }}">{{ o.name }}</option></sc-for>
            </select>
            <button onClick="{{ addFlowStep }}" style="height:30px;padding:0 11px;border-radius:8px;background:#fff;border:1px solid #E6E3DC;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">+ 加入流程</button>
            <div style="flex:1;"></div>
            <span style="font-size:11.5px;color:#A39E94;">执行器池({{ deptPoolHint }}):</span>
            <sc-for list="{{ deptExecs }}" as="x"><button onClick="{{ x.toggle }}" style="height:26px;padding:0 10px;border-radius:7px;border:1px solid {{ x.bd }};background:{{ x.bg }};font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;">{{ x.name }}</button></sc-for>
          </div>
          </sc-if>
        </div>

        <div style="display:flex;align-items:center;gap:9px;margin:4px 2px 12px;">
          <span style="font-size:13.5px;font-weight:650;">部门员工</span><span style="font-size:11.5px;color:#A39E94;">任务由编排器拆分给最合适的员工执行 · {{ deptEmpN }} 名</span>
          <div style="flex:1;"></div>
          <sc-if value="{{ isAdmin }}"><button onClick="{{ hireEmp }}" style="height:28px;padding:0 11px;border-radius:8px;background:#fff;border:1px solid #E6E3DC;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">+ 新增员工</button></sc-if>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;">
          <sc-for list="{{ deptEmployees }}" as="e" hint-placeholder-count="6">
            <div style="background:#fff;border:1px solid #E9E7E1;border-radius:13px;padding:14px;box-shadow:0 1px 2px rgba(20,18,14,.04);">
              <div style="display:flex;align-items:center;gap:9px;">
                <span style="width:32px;height:32px;flex:none;border-radius:9px;background:{{ dept.color }}22;font-size:16px;display:flex;align-items:center;justify-content:center;">{{ e.emoji }}</span>
                <div style="flex:1;min-width:0;font-size:13.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ e.name }}</div>
                <span style="font-size:10px;font-weight:600;color:#8A857C;background:#F4F2ED;border:1px solid #ECEAE4;padding:2px 7px;border-radius:6px;font-family:'JetBrains Mono',monospace;">{{ e.executor }}</span>
                <sc-if value="{{ isAdmin }}"><button onClick="{{ e.del }}" style="width:24px;height:24px;border:none;background:transparent;cursor:pointer;color:#C9C4BA;font-size:13px;" style-hover="color:#B4541E">✕</button></sc-if>
              </div>
              <div style="font-size:11.5px;color:#8A857C;margin-top:9px;line-height:1.55;min-height:34px;">{{ e.description }}</div>
            </div>
          </sc-for>
        </div>

        <div style="display:flex;align-items:center;gap:9px;margin:4px 2px 12px;"><span style="font-size:13.5px;font-weight:650;">本部门 Agent</span></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;">
          <sc-for list="{{ dept.agents }}" as="a" hint-placeholder-count="3">
            <button onClick="{{ a.open }}" style-hover="border-color:#D9D5CC" style="text-align:left;cursor:pointer;background:#fff;border:1px solid #E9E7E1;border-radius:13px;padding:14px;font-family:inherit;box-shadow:0 1px 2px rgba(20,18,14,.04);">
              <div style="display:flex;align-items:center;gap:9px;"><div style="width:30px;height:30px;border-radius:8px;background:{{ a.color }};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ a.avatar }}</div><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ a.name }}</div><div style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ a.model }}</div></div><span style="font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px;background:{{ a.sBg }};color:{{ a.sC }};">{{ a.sLabel }}</span></div>
              <div style="font-size:11.5px;color:#8A857C;margin-top:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ a.action }}</div>
            </button>
          </sc-for>
        </div>

        <div style="display:flex;align-items:center;gap:9px;margin:4px 2px 12px;"><span style="font-size:13.5px;font-weight:650;">任务看板</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
          <div style="background:#F2F0EB;border-radius:13px;padding:12px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:0 4px;"><span style="font-size:12.5px;font-weight:650;">待分配</span><span style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ dept.board.todoN }}</span></div>
            <sc-for list="{{ dept.board.todo }}" as="c" hint-placeholder-count="2"><div style="background:#fff;border:1px solid #E9E7E1;border-radius:10px;padding:11px 12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(20,18,14,.03);"><div style="font-size:12.5px;font-weight:600;">{{ c.t }}</div><div style="font-size:11px;color:#A39E94;margin-top:5px;">{{ c.m }}</div></div></sc-for>
          </div>
          <div style="background:#F2F0EB;border-radius:13px;padding:12px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:0 4px;"><span style="font-size:12.5px;font-weight:650;">进行中</span><span style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ dept.board.doingN }}</span></div>
            <sc-for list="{{ dept.board.doing }}" as="c" hint-placeholder-count="2"><div style="background:#fff;border:1px solid #E9E7E1;border-radius:10px;padding:11px 12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(20,18,14,.03);"><div style="display:flex;align-items:center;gap:6px;"><span style="position:relative;display:inline-flex;width:6px;height:6px;"><span style="position:absolute;inset:0;border-radius:50%;background:{{ acc }};animation:ping 1.8s ease-out infinite;"></span><span style="position:relative;width:6px;height:6px;border-radius:50%;background:{{ acc }};"></span></span><span style="font-size:12.5px;font-weight:600;">{{ c.t }}</span></div><div style="font-size:11px;color:#A39E94;margin-top:5px;">{{ c.m }}</div></div></sc-for>
          </div>
          <div style="background:#F2F0EB;border-radius:13px;padding:12px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:0 4px;"><span style="font-size:12.5px;font-weight:650;">已完成</span><span style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ dept.board.doneN }}</span></div>
            <sc-for list="{{ dept.board.done }}" as="c" hint-placeholder-count="2"><div style="background:#fff;border:1px solid #E9E7E1;border-radius:10px;padding:11px 12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(20,18,14,.03);opacity:.78;"><div style="font-size:12.5px;font-weight:600;">{{ c.t }}</div><div style="font-size:11px;color:#A39E94;margin-top:5px;">{{ c.m }}</div></div></sc-for>

        </div>

      <!-- ====================== PROJECTS LIST ====================== -->
      <sc-if value="{{ isProjects }}">

        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px;"><div><h1 style="font-size:21px;font-weight:700;margin:0;">项目</h1><div style="font-size:13px;color:#8A857C;margin-top:4px;">按项目隔离 · 任务归属各自项目</div></div><button onClick="{{ newProject }}" style="height:34px;padding:0 14px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:13px;cursor:pointer;font-family:inherit;">+ 新建项目</button></div>
