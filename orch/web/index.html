      <div style="padding:24px 30px 40px;max-width:1080px;">
        <button onClick="{{ goProjects }}" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:#8A857C;margin-bottom:14px;"><svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 4l-4 5 4 5"></path></svg>返回项目</button>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px;"><div style="flex:1;"><div style="display:flex;align-items:center;gap:10px;"><h1 style="font-size:21px;font-weight:700;margin:0;">{{ project.name }}</h1><span style="font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:{{ project.sBg }};color:{{ project.sC }};">{{ project.status }}</span></div><div style="font-size:13px;color:#8A857C;margin-top:5px;">{{ project.client }} · 项目级隔离已启用</div></div></div>
        <div style="display:flex;gap:10px;margin:18px 0 22px;">
          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">完成度</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;">{{ project.pct }}</div></div>
          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">任务</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;">{{ project.taskCount }}</div></div>
          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">Agent</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;">{{ project.agentCount }}</div></div>
          <div style="flex:1;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:13px 15px;"><div style="font-size:11.5px;color:#A39E94;">涉及部门</div><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;">{{ project.deptN }}</div></div>
        </div>
        <sc-if value="{{ projAmOwner }}">
        <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;padding:14px 16px;margin-bottom:16px;">
          <div style="font-size:13.5px;font-weight:650;margin-bottom:4px;">项目授权</div>
          <div style="font-size:12px;color:#8A857C;margin-bottom:10px;">授权后该用户可查看本项目;非本人任务只能看,不能停止/修改</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            <sc-for list="{{ grantPeople }}" as="p" hint-placeholder-count="3"><button onClick="{{ p.toggle }}" style="display:flex;align-items:center;gap:7px;border:1px solid {{ p.bd }};background:{{ p.bg }};border-radius:8px;padding:5px 11px;cursor:pointer;font-family:inherit;font-size:12.5px;"><span style="width:20px;height:20px;border-radius:6px;background:{{ p.color }};color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ p.av }}</span>{{ p.name }} · {{ p.label }}</button></sc-for>
          </div>
        </div>
        </sc-if>
        <div style="display:flex;align-items:center;gap:9px;margin:4px 2px 12px;"><span style="font-size:13.5px;font-weight:650;">项目任务</span></div>
        <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(20,18,14,.04);">
          <sc-for list="{{ project.tasks }}" as="t" hint-placeholder-count="4">
            <button onClick="{{ t.open }}" style-hover="background:#FAF9F6" style="width:100%;text-align:left;border:none;border-bottom:1px solid #F2F0EB;background:transparent;cursor:pointer;display:flex;align-items:center;gap:14px;padding:13px 18px;font-family:inherit;">
              <span style="font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#B6B1A7;width:54px;flex:none;">{{ t.id }}</span>
              <span style="flex:1;font-size:13.5px;font-weight:600;">{{ t.title }}</span>
              <div style="display:flex;gap:4px;flex:none;"><sc-for list="{{ t.assignees }}" as="ag" hint-placeholder-count="2"><span style="width:22px;height:22px;border-radius:6px;background:{{ ag.color }};color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ ag.avatar }}</span></sc-for></div>
              <span style="flex:none;width:72px;text-align:right;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:{{ t.sBg }};color:{{ t.sC }};">{{ t.sLabel }}</span>
            </button>
          </sc-for>
        </div>
      </div>
      </sc-if>

      <!-- ====================== TASKS LIST ====================== -->
      <sc-if value="{{ isTasks }}">
      <div style="padding:26px 30px 40px;max-width:1080px;">
        <div style="display:flex;align-items:flex-end;gap:14px;margin-bottom:18px;">
          <div style="flex:1;"><h1 style="font-size:21px;font-weight:700;margin:0;">任务</h1><div style="font-size:13px;color:#8A857C;margin-top:4px;">编排器统筹下的全部任务 · 点击查看接力过程</div></div>
          <input onkeyup="{{ onTaskQ }}" placeholder="🔍 筛选任务…" style="height:30px;width:150px;border:1px solid #E6E3DC;border-radius:8px;padding:0 10px;font-family:inherit;font-size:12.5px;box-sizing:border-box;">
          <div style="display:flex;align-items:center;padding:3px;background:#F0EEE9;border-radius:9px;gap:2px;">
            <button onClick="{{ setViewList }}" style="height:28px;padding:0 12px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:{{ viewListBg }};">☰ 列表</button>
            <button onClick="{{ setViewBoard }}" style="height:28px;padding:0 12px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:{{ viewBoardBg }};">▦ 看板</button>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
          <sc-for list="{{ taskFilters }}" as="tf"><button onClick="{{ tf.pick }}" style="height:26px;padding:0 12px;border:none;border-radius:8px;cursor:pointer;font-size:11.5px;font-weight:600;font-family:inherit;background:{{ tf.bg }};color:{{ tf.c }};">{{ tf.n }}</button></sc-for>
        </div>
        <sc-if value="{{ hasSchedules }}">
        <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;padding:13px 16px;margin-bottom:16px;">
          <div style="font-size:13px;font-weight:650;margin-bottom:9px;">⏰ 定时任务</div>
          <sc-for list="{{ schedules }}" as="sc">
            <div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid #F2F0EB;font-size:12.5px;">
              <span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ sc.text }}</span>
              <span style="color:#8A857C;flex:none;">{{ sc.rule }}</span>
              <span style="color:#B6B1A7;flex:none;font-size:11px;">上次: {{ sc.last }}</span>
              <button onClick="{{ sc.toggle }}" style="height:24px;padding:0 10px;border:none;border-radius:7px;background:{{ sc.onBg }};color:{{ sc.onC }};font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;">{{ sc.onLabel }}</button>
              <button onClick="{{ sc.del }}" style="height:24px;width:26px;border:1px solid #E6E3DC;background:#fff;border-radius:7px;font-size:11px;color:#B4541E;cursor:pointer;">✕</button>
            </div>
          </sc-for>
        </div>
        </sc-if>
        <sc-if value="{{ taskViewBoard }}">
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:start;">
          <sc-for list="{{ board }}" as="col">
            <div style="background:#F4F2ED;border-radius:12px;padding:9px;">
              <div style="display:flex;align-items:center;gap:6px;padding:2px 4px 8px;"><span style="width:8px;height:8px;border-radius:50%;background:{{ col.color }};"></span><span style="font-size:12px;font-weight:650;">{{ col.name }}</span><span style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ col.n }}</span></div>
              <sc-for list="{{ col.items }}" as="tc">
                <button onClick="{{ tc.open }}" style-hover="border-color:#D9D5CC" style="width:100%;text-align:left;background:#fff;border:1px solid #E9E7E1;border-radius:10px;padding:10px 11px;margin-bottom:8px;cursor:pointer;font-family:inherit;box-shadow:0 1px 2px rgba(20,18,14,.04);">
                  <div style="font-size:12.5px;font-weight:600;line-height:1.4;">{{ tc.title }}</div>
                  <div style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:10.5px;color:#A39E94;"><span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ tc.proj }}</span><span style="font-family:'JetBrains Mono',monospace;">{{ tc.cost }}</span></div>
                  <sc-if value="{{ tc.nowDoing }}"><div style="font-size:10.5px;color:#8a6d00;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">▸ {{ tc.nowDoing }}</div></sc-if>
                </button>
              </sc-for>
            </div>
          </sc-for>
        </div>
        </sc-if>
        <sc-if value="{{ taskViewList }}">
        <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(20,18,14,.04);">
          <div style="display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid #F0EEE9;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#B6B1A7;"><span style="width:54px;flex:none;">ID</span><span style="flex:1;">任务</span><span style="width:140px;">项目</span><span style="width:70px;">Agent</span><span style="width:72px;text-align:right;">状态</span></div>
          <sc-for list="{{ tasksList }}" as="t" hint-placeholder-count="5">
            <button onClick="{{ t.open }}" style-hover="background:#FAF9F6" style="width:100%;text-align:left;border:none;border-bottom:1px solid #F2F0EB;background:transparent;cursor:pointer;display:flex;align-items:center;gap:14px;padding:13px 18px;font-family:inherit;">
              <span style="font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#B6B1A7;width:54px;flex:none;">{{ t.id }}</span>
              <div style="flex:1;min-width:0;"><div style="font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ t.title }}</div><div style="font-size:11px;color:#B6B1A7;margin-top:2px;">更新于 {{ t.updated }}</div><sc-if value="{{ t.nowDoing }}"><div style="font-size:11.5px;color:#8a6d00;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">▸ {{ t.nowDoing }}</div></sc-if></div>
              <span style="width:140px;font-size:12px;color:#8A857C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ t.proj }}</span>
              <div style="width:88px;flex:none;"><sc-if value="{{ t.progressLabel }}"><div style="font-size:10.5px;color:#8A857C;margin-bottom:3px;">{{ t.progressLabel }}</div><div style="height:4px;border-radius:3px;background:#EDEBE5;overflow:hidden;"><div style="height:100%;width:{{ t.progress }}%;background:#2E9E5B;"></div></div></sc-if></div>
              <div style="width:70px;display:flex;gap:4px;"><sc-for list="{{ t.assignees }}" as="ag" hint-placeholder-count="2"><span style="width:22px;height:22px;border-radius:6px;background:{{ ag.color }};color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ ag.avatar }}</span></sc-for></div>
              <span style="width:72px;text-align:right;flex:none;font-size:11.5px;font-weight:600;"><span style="padding:3px 9px;border-radius:7px;background:{{ t.sBg }};color:{{ t.sC }};">{{ t.sLabel }}</span></span>
            </button>
          </sc-for>
        </div>
        </sc-if>
      </div>
      </sc-if>

      <!-- ====================== AGENTS ROSTER ====================== -->
      <sc-if value="{{ isAgents }}">
      <div style="padding:26px 30px 40px;max-width:1240px;">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;"><div><h1 style="font-size:21px;font-weight:700;margin:0;">Agent 团队</h1><div style="font-size:13px;color:#8A857C;margin-top:4px;">{{ agentTotal }} 个 Agent · Claude 与 Codex</div></div><button onClick="{{ newAgent }}" style="height:34px;padding:0 14px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:13px;cursor:pointer;font-family:inherit;">+ 新建 Agent</button></div>
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:#fff;border:1px solid #E9E7E1;border-radius:12px;padding:11px 14px;margin-bottom:16px;">
          <span style="font-size:12.5px;font-weight:650;">执行器健康</span>
          <sc-for list="{{ execHealth }}" as="h"><span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:{{ h.bg }};color:{{ h.c }};">{{ h.name }} · {{ h.label }}</span></sc-for>
          <div style="flex:1;"></div>
          <button onClick="{{ refreshHealth }}" style="height:26px;padding:0 10px;border-radius:7px;background:#fff;border:1px solid #E6E3DC;font-size:11.5px;cursor:pointer;font-family:inherit;">↻ 重测</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:13px;">
          <sc-for list="{{ agents }}" as="a" hint-placeholder-count="9">
            <button onClick="{{ a.open }}" style-hover="border-color:#D9D5CC;transform:translateY(-1px)" style="text-align:left;cursor:pointer;background:#fff;border:1px solid #E9E7E1;border-radius:14px;padding:15px;font-family:inherit;box-shadow:0 1px 2px rgba(20,18,14,.04);transition:transform .15s ease,border-color .15s ease;">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><div style="width:34px;height:34px;border-radius:9px;background:{{ a.color }};color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ a.avatar }}</div><div style="flex:1;min-width:0;"><div style="font-size:13.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ a.name }}</div><div style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ a.typeLabel }} · {{ a.model }}</div></div></div>
              <div style="display:flex;align-items:center;gap:7px;margin-bottom:11px;"><span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:{{ a.sBg }};color:{{ a.sC }};"><span style="width:6px;height:6px;border-radius:50%;background:{{ a.sDot }};"></span>{{ a.sLabel }}</span><span style="font-size:11.5px;color:#8A857C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ a.task }}</span></div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding-top:11px;border-top:1px solid #F2F0EB;"><span style="font-size:11px;color:#A39E94;">成功率 <b style="color:#1F7A46;font-family:'JetBrains Mono',monospace;">{{ a.success }}</b></span><span style="font-size:11px;color:#A39E94;">完成 <b style="color:#3C3933;font-family:'JetBrains Mono',monospace;">{{ a.done }}</b></span></div>
            </button>
          </sc-for>
        </div>
      </div>
      </sc-if>

      <!-- ====================== PEOPLE ====================== -->
      <sc-if value="{{ isPeople }}">
      <div style="padding:26px 30px 40px;max-width:1000px;">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;"><div><h1 style="font-size:21px;font-weight:700;margin:0;">人员</h1><div style="font-size:13px;color:#8A857C;margin-top:4px;">按人隔离 · 给成员分配可负责的 Agent</div></div><button onClick="{{ newPerson }}" style="height:34px;padding:0 14px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:13px;cursor:pointer;font-family:inherit;">+ 新建人员</button></div>
        <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(20,18,14,.04);">
          <div style="display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid #F0EEE9;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#B6B1A7;"><span style="flex:1;">成员</span><span style="width:120px;">角色</span><span style="width:80px;text-align:center;">项目</span><span style="width:80px;text-align:center;">Agent</span><span style="width:90px;text-align:right;">活跃</span></div>
          <sc-for list="{{ people }}" as="p" hint-placeholder-count="6">
            <div style="display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid #F2F0EB;">
              <div style="flex:1;display:flex;align-items:center;gap:11px;"><div style="width:32px;height:32px;border-radius:50%;background:{{ p.color }};color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;">{{ p.av }}</div><div><div style="font-size:13.5px;font-weight:600;">{{ p.name }}</div><div style="font-size:11px;color:#A39E94;">{{ p.email }}</div></div></div>
              <span style="width:120px;font-size:12.5px;color:#3C3933;">{{ p.role }}</span>
              <span style="width:80px;text-align:center;font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;">{{ p.projects }}</span>
              <span style="width:80px;text-align:center;font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;">{{ p.agents }}</span>
              <span style="width:70px;text-align:right;font-size:11.5px;color:#A39E94;">{{ p.last }}</span>
              <button onClick="{{ p.assign }}" style="margin-left:10px;height:28px;padding:0 11px;border-radius:7px;background:#fff;border:1px solid #E6E3DC;font-size:12px;cursor:pointer;font-family:inherit;">分配</button>
            </div>
          </sc-for>
        </div>
      </div>
      </sc-if>

      <sc-if value="{{ isSearch }}">
      <div style="padding:26px 30px 40px;max-width:1080px;">
        <div style="margin-bottom:18px;"><h1 style="font-size:21px;font-weight:700;margin:0;">搜索 "{{ q }}"</h1><div style="font-size:13px;color:#8A857C;margin-top:4px;">{{ searchSummary }}</div></div>
        <sc-for list="{{ searchGroups }}" as="g" hint-placeholder-count="4">
          <div style="margin-bottom:18px;">
            <div style="font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#A39E94;margin-bottom:8px;">{{ g.label }}</div>
            <div style="background:#fff;border:1px solid #E9E7E1;border-radius:12px;overflow:hidden;">
              <sc-for list="{{ g.items }}" as="it" hint-placeholder-count="3">
                <button onClick="{{ it.open }}" style-hover="background:#FAF9F6" style="width:100%;text-align:left;border:none;border-bottom:1px solid #F2F0EB;background:transparent;cursor:pointer;display:flex;align-items:center;gap:10px;padding:11px 16px;font-family:inherit;">
                  <span style="font-size:13.5px;font-weight:600;">{{ it.title }}</span><span style="font-size:12px;color:#A39E94;">{{ it.sub }}</span>
                </button>
              </sc-for>
            </div>
          </div>
        </sc-for>
      </div>
      </sc-if>

      <sc-if value="{{ isApps }}">
      <div style="padding:26px 30px 40px;max-width:1180px;">
        <div style="margin-bottom:18px;"><h1 style="font-size:21px;font-weight:700;margin:0;">应用广场</h1><div style="font-size:13px;color:#8A857C;margin-top:4px;">已发布的应用,点击直接运行</div></div>
        <sc-if value="{{ appOpen }}">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <button onClick="{{ closeApp }}" style="height:32px;padding:0 13px;border-radius:8px;background:#fff;border:1px solid #E6E3DC;cursor:pointer;font-family:inherit;font-size:12.5px;">← 返回</button>
            <span style="font-size:14px;font-weight:650;">{{ curApp.name }}</span>
            <a href="{{ curApp.url }}" target="_blank" style="margin-left:auto;font-size:12.5px;color:#8a6d00;text-decoration:none;">新标签打开 ↗</a>
          </div>
          <iframe src="{{ curApp.url }}" style="width:100%;height:72vh;border:1px solid #E9E7E1;border-radius:12px;background:#fff;"></iframe>
        </sc-if>
        <sc-if value="{{ appList }}">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
            <sc-for list="{{ apps }}" as="a" hint-placeholder-count="3">
              <div style="background:#fff;border:1px solid #E9E7E1;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(20,18,14,.04);">
                <button onClick="{{ a.open }}" style-hover="opacity:.92" style="width:100%;border:none;background:#F7F6F3;cursor:pointer;padding:0;display:block;height:150px;overflow:hidden;"><iframe src="{{ a.url }}" scrolling="no" style="width:100%;height:150px;border:none;pointer-events:none;background:#fff;"></iframe></button>
                <div style="padding:12px 14px;display:flex;align-items:center;gap:8px;">
                  <div style="flex:1;min-width:0;"><div style="font-size:13.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ a.name }}</div><div style="font-size:11px;color:#A39E94;font-family:'JetBrains Mono',monospace;">{{ a.entry }} · {{ a.updated }}</div></div>
                  <button onClick="{{ a.open }}" style="height:30px;padding:0 12px;border-radius:8px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;font-size:12px;cursor:pointer;font-family:inherit;">运行</button>
                  <sc-if value="{{ a.canDel }}"><button onClick="{{ a.del }}" style="height:30px;width:32px;border-radius:8px;background:#fff;border:1px solid #E6E3DC;cursor:pointer;font-size:13px;">🗑</button></sc-if>
                </div>
              </div>
            </sc-for>
          </div>
        </sc-if>
      </div>
      </sc-if>

    </main>
  </div>

      <input id="he-name" placeholder="角色名,如 视频剪辑师" style="width:100%;height:34px;border:1px solid #E6E3DC;border-radius:9px;padding:0 10px;font-family:inherit;box-sizing:border-box;margin-bottom:9px;">
      <input id="he-desc" placeholder="一句话职责(编排器据此选人)" style="width:100%;height:34px;border:1px solid #E6E3DC;border-radius:9px;padding:0 10px;font-family:inherit;box-sizing:border-box;margin-bottom:9px;">
      <textarea id="he-prompt" placeholder="角色提示词:你是…(身份/关键规则/交付物标准)" style="width:100%;height:110px;border:1px solid #E6E3DC;border-radius:9px;padding:10px;font-family:inherit;font-size:12.5px;resize:vertical;box-sizing:border-box;margin-bottom:9px;"></textarea>
      <select id="he-exec" style="width:100%;height:34px;border:1px solid #E6E3DC;border-radius:9px;padding:0 8px;font-family:inherit;box-sizing:border-box;color:#3C3933;">
        <sc-for list="{{ execOpts }}" as="x"><option value="{{ x.id }}">执行器: {{ x.name }}</option></sc-for>
      </select>
      <div style="display:flex;justify-content:flex-end;gap:9px;margin-top:16px;">
        <button onClick="{{ closeModal }}" style="height:34px;padding:0 14px;border-radius:9px;background:#fff;border:1px solid #E6E3DC;cursor:pointer;font-family:inherit;">取消</button>
        <button onClick="{{ submitHire }}" style="height:34px;padding:0 16px;border-radius:9px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:650;cursor:pointer;font-family:inherit;">入职</button>
      </div>
    </div>
  </div>
  </sc-if>

  <sc-if value="{{ modalReplay }}">
  <div style="position:fixed;inset:0;background:rgba(20,18,14,.5);display:flex;align-items:center;justify-content:center;z-index:70;">
    <div style="background:#fff;border-radius:16px;padding:20px;width:860px;max-width:94vw;height:560px;max-height:88vh;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <span style="font-size:15px;font-weight:700;">▶ 任务回放</span>
        <span style="flex:1;min-width:0;font-size:12.5px;color:#8A857C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ repTitle }}</span>
        <button onClick="{{ closeModal }}" style="height:30px;padding:0 12px;border-radius:8px;background:#fff;border:1px solid #E6E3DC;cursor:pointer;font-family:inherit;font-size:12.5px;">关闭</button>
      </div>
      <div style="flex:1;min-height:0;display:grid;grid-template-columns:280px 1fr;gap:12px;">
        <div style="border:1px solid #E9E7E1;border-radius:11px;overflow:auto;">
          <sc-for list="{{ repEvents }}" as="ev">
            <button onClick="{{ ev.pick }}" style-hover="background:#FAF9F6" style="width:100%;text-align:left;border:none;border-bottom:1px solid #F2F0EB;background:{{ ev.bg }};cursor:pointer;padding:8px 11px;font-family:inherit;">
              <span style="font-size:10.5px;color:#B6B1A7;font-family:'JetBrains Mono',monospace;">{{ ev.time }}</span>
              <div style="font-size:12px;margin-top:2px;">{{ ev.txt }}</div>
            </button>
          </sc-for>
        </div>
        <div style="border:1px solid #E9E7E1;border-radius:11px;overflow:hidden;display:flex;flex-direction:column;">
          <div style="padding:8px 12px;border-bottom:1px solid #F0EEE9;font-size:12px;font-weight:650;background:#FBFAF8;">{{ repStep }} 的执行日志</div>
          <pre style="flex:1;margin:0;overflow:auto;padding:11px 13px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.55;white-space:pre-wrap;background:#fff;color:#2A2722;">{{ repLogs }}</pre>
        </div>
      </div>
    </div>
  </div>
  </sc-if>

  <sc-if value="{{ needLogin }}">
  <div style="position:fixed;inset:0;background:#1A1814;display:flex;align-items:center;justify-content:center;z-index:100;">
    <div style="background:#fff;border-radius:18px;padding:30px;width:360px;box-shadow:0 30px 80px rgba(0,0,0,.4);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;"><div style="width:30px;height:30px;border-radius:9px;background:{{ acc }};color:#1A1814;font-weight:800;display:flex;align-items:center;justify-content:center;">M</div><div style="font-size:18px;font-weight:800;">Maestro 登录</div></div>
      <div style="font-size:12.5px;color:#8A857C;margin:2px 0 18px;">默认管理员 admin / admin,登录后可在右下角账号里改密码</div>
      <input id="lg-name" placeholder="用户名" style="width:100%;height:38px;border:1px solid #E6E3DC;border-radius:10px;padding:0 12px;font-family:inherit;font-size:14px;box-sizing:border-box;margin-bottom:10px;">
      <input id="lg-pw" type="password" placeholder="密码" onkeydown="{{ onLoginKey }}" style="width:100%;height:38px;border:1px solid #E6E3DC;border-radius:10px;padding:0 12px;font-family:inherit;font-size:14px;box-sizing:border-box;">
      <sc-if value="{{ loginErr }}"><div style="color:#DC5B52;font-size:12.5px;margin-top:10px;">{{ loginErr }}</div></sc-if>
      <button onClick="{{ submitLogin }}" style="width:100%;height:40px;margin-top:16px;border-radius:10px;background:{{ acc }};color:{{ accTxt }};border:1px solid {{ accBd }};font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;">登录</button>
    </div>
  </div>
  </sc-if>
  <sc-if value="{{ toast }}"><div style="position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:90;background:#1A1814;color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.28);">{{ toast }}</div></sc-if>
</template>
<script src="runtime.js"></script>
<script src="app.js"></script>
</body>
</html>
